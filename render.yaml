services:
  - type: web
    name: guidewire-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    branch: shivanshu
    healthCheckPath: /admin/ledger
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./test.db
